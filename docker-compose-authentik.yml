# Authentik identity provider for PiPiMink OAuth2/OIDC authentication.
# Start with: docker compose -f docker-compose-authentik.yml up -d
#
# First-run setup:
#   1. Open http://localhost:9000/if/flow/initial-setup/
#   2. Create an admin account
#   3. Create an OAuth2/OpenID provider + application for PiPiMink
#   4. Set the redirect URI to http://localhost:8080/auth/callback
#   5. Copy Client ID / Client Secret into your .env file
#
# ⚠️  DEVELOPMENT DEFAULTS — change secrets for any networked or production deployment.

services:
  authentik-postgres:
    container_name: authentik-postgres
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: authentik-password
      POSTGRES_DB: authentik
    volumes:
      - authentik-pgdata:/var/lib/postgresql/data
    networks:
      - pipimink-network

  authentik-redis:
    container_name: authentik-redis
    image: redis:7-alpine
    command: --save 60 1 --loglevel warning
    restart: unless-stopped
    volumes:
      - authentik-redis:/data
    networks:
      - pipimink-network

  authentik-server:
    container_name: authentik-server
    image: ghcr.io/goauthentik/server:2024.12
    command: server
    restart: unless-stopped
    environment:
      AUTHENTIK_SECRET_KEY: pipimink-dev-secret-key-change-in-prod
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: authentik-password
      AUTHENTIK_POSTGRESQL__NAME: authentik
    ports:
      - "9000:9000"
    depends_on:
      - authentik-postgres
      - authentik-redis
    networks:
      - pipimink-network

  authentik-worker:
    container_name: authentik-worker
    image: ghcr.io/goauthentik/server:2024.12
    command: worker
    restart: unless-stopped
    environment:
      AUTHENTIK_SECRET_KEY: pipimink-dev-secret-key-change-in-prod
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: authentik-password
      AUTHENTIK_POSTGRESQL__NAME: authentik
    depends_on:
      - authentik-postgres
      - authentik-redis
    networks:
      - pipimink-network

networks:
  pipimink-network:
    name: pipimink-network
    external: true

volumes:
  authentik-pgdata:
    name: authentik-postgres-data
  authentik-redis:
    name: authentik-redis-data
