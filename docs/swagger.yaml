basePath: /
definitions:
  models.ChatRequest:
    properties:
      message:
        type: string
      messages:
        items:
          additionalProperties: true
          type: object
        type: array
    type: object
  models.ChatResponse:
    properties:
      model:
        type: string
      response:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    name: API Support
    url: https://github.com/Izzetee/PiPiMink
  description: An intelligent router for AI language model requests
  license:
    name: Apache 2.0 with Commons Clause
  title: PiPiMink API
  version: "1.0"
paths:
  /admin:
    get:
      description: Serves the admin web interface for model discovery, tagging, and
        benchmarking.
      produces:
      - text/html
      responses:
        "200":
          description: HTML page
          schema:
            type: string
      summary: Admin UI
      tags:
      - admin
  /benchmarks/leaderboard:
    get:
      description: Returns all models with benchmark scores, sorted by average score
        descending. Optional ?category filter.
      parameters:
      - description: Filter by category
        in: query
        name: category
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Benchmark leaderboard
      tags:
      - models
  /chat:
    post:
      consumes:
      - application/json
      description: Routes the chat request to the most appropriate AI model based
        on message content
      parameters:
      - description: Chat request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.ChatRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ChatResponse'
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Process a chat request
      tags:
      - chat
  /models:
    get:
      description: Returns a list of all available models
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: List available models
      tags:
      - models
  /models/{name}/benchmarks:
    get:
      description: Returns average benchmark scores per category for the specified
        model.
      parameters:
      - description: Model name
        in: path
        name: name
        required: true
        type: string
      - description: Provider source (required when multiple providers have the same
          model name)
        in: query
        name: source
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Model not found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get model benchmark scores
      tags:
      - models
  /models/{name}/enable:
    patch:
      consumes:
      - application/json
      description: Sets the enabled flag for a model. Requires admin API key.
      parameters:
      - description: Model name
        in: path
        name: name
        required: true
        type: string
      - description: Admin API Key
        in: header
        name: X-API-Key
        required: true
        type: string
      - description: '{\'
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Enable or disable a model
      tags:
      - models
      - admin
  /models/benchmark:
    post:
      description: 'Runs capability benchmarks against enabled models. Optional query
        params: model, category.'
      parameters:
      - description: Admin API Key
        in: header
        name: X-API-Key
        required: true
        type: string
      - description: Run only for this model name
        in: query
        name: model
        type: string
      - description: Run only tasks in this category (coding|reasoning|instruction-following|creative-writing|summarization|factual-qa)
        in: query
        name: category
        type: string
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Benchmarks disabled
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Run model benchmarks
      tags:
      - models
      - admin
  /models/discover:
    post:
      description: Queries each configured provider for its model list and registers
        any new models (no tagging).
      parameters:
      - description: Admin API Key
        in: header
        name: X-API-Key
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Discover models from all providers
      tags:
      - models
      - admin
  /models/tag:
    post:
      consumes:
      - application/json
      description: Runs the capability self-assessment (interview) for each supplied
        model and persists the tags.
      parameters:
      - description: Admin API Key
        in: header
        name: X-API-Key
        required: true
        type: string
      - description: 'List of models to tag: {\'
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Tag selected models
      tags:
      - models
      - admin
  /models/update:
    post:
      consumes:
      - application/json
      description: Triggers an update of model information from all configured sources
      parameters:
      - description: Admin API Key
        in: header
        name: X-API-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update model information
      tags:
      - models
      - admin
  /v1/chat/completions:
    post:
      consumes:
      - application/json
      description: OpenAI-compatible endpoint for chat completions
      parameters:
      - description: OpenAI-compatible chat request
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: OpenAI-compatible chat completions
      tags:
      - openai
      - chat
  /v1/models:
    get:
      description: OpenAI-compatible endpoint for listing available models
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: OpenAI-compatible models listing
      tags:
      - openai
      - models
swagger: "2.0"
