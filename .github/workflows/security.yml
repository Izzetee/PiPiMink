name: Security

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  actions: read
  pull-requests: read
  security-events: write

jobs:
  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
